name: CI
on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'

# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read

jobs:
  test:
    name: Test Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'    # LTS
          - '1'       # current stable
          - 'pre'     # next release, if available
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        allow_failure: [false]
        include:
          - version: 'nightly'
            os: ubuntu-latest
            allow_failure: true
    env:
      REVISE_PRECOMPILE_ERROR: true
    steps:
    - uses: actions/checkout@v6
    - uses: julia-actions/setup-julia@latest
      with:
        version: ${{ matrix.version }}
        show-versioninfo: ${{ matrix.version == 'nightly' }}
    - uses: julia-actions/cache@v3
    - uses: julia-actions/julia-buildpkg@latest
    # Revise's tests need significant customization
    # Populate the precompile cache with an extraneous file, to catch issues like in #460
    - name: populate_compiled
      if: ${{ matrix.os != 'windows-latest' }}
      run: julia -e 'include(joinpath("test", "populate_compiled.jl"))'
    - uses: julia-actions/julia-runtest@latest
    - name: filewatching
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.version != '1.0' }}
      run: julia --project -e 'using Pkg; Pkg.build(); Pkg.test(; test_args=["REVISE_TESTS_WATCH_FILES"], coverage=true)'
    - name: extra tests
      if: ${{ matrix.os != 'windows-latest' && matrix.version != '1.0' }}
      run: |
        echo $TERM
        # Tests for when using polling
        echo "Polling"
        julia --project --code-coverage=user -e '
          ENV["JULIA_REVISE_POLL"]="1"
          using Pkg, Revise
          include(joinpath(dirname(pathof(Revise)), "..", "test", "polling.jl"))
        '
        # The REPL wasn't initialized, so the "Methods at REPL" tests didn't run. Pick those up now.
        echo "Methods at REPL"
        TERM="xterm" julia --project --code-coverage=user -e '
          using InteractiveUtils, REPL, Revise
          t = @async(
            VERSION >= v"1.12.0-DEV.612" ? Base.run_main_repl(true, true, :no, true) :
            VERSION >= v"1.11.0-DEV.222" ? Base.run_main_repl(true, true, :no, true, false)   :
                                           Base.run_main_repl(true, true, false, true, false))
          isdefined(Base, :errormonitor) && Base.errormonitor(t)
          while (!isdefined(Base, :active_repl_backend) || isnothing(Base.active_repl_backend)) sleep(0.1) end
          pushfirst!(Base.active_repl_backend.ast_transforms, Revise.revise_first)
          include(joinpath("test", "runtests.jl"))
          if Base.VERSION.major == 1 && Base.VERSION.minor >= 9
              REPL.eval_user_input(:(exit()), Base.active_repl_backend, Main)
          else
              REPL.eval_user_input(:(exit()), Base.active_repl_backend)
          end' "Methods at REPL"
        # We also need to pick up the Git tests, but for that we need to `dev` the package
        echo "Git tests"
        julia --code-coverage=user -e '
          using Pkg; Pkg.develop(PackageSpec(path="."))
          include(joinpath("test", "runtests.jl"))
        ' "Git"
        # Check #664
        echo "Test #664"
        TERM="xterm" julia --startup-file=no --project test/start_late.jl
        # Check #697
        echo "Test #697"
        dn=$(mktemp -d)
        ver=$(julia -e '(!isempty(VERSION.prerelease) && VERSION.prerelease[1] == "DEV") ? println(Base.GIT_VERSION_INFO.commit) : println(VERSION)')
        path=$(julia -e '(!isempty(VERSION.prerelease) && VERSION.prerelease[1] == "DEV") ? println(Base.GIT_VERSION_INFO.commit) : println("refs/tags/v",VERSION)')
        curl -s -L https://github.com/JuliaLang/julia/archive/$path.tar.gz --output - | tar -xz -C $dn
        julia --project test/juliadir.jl "$dn/julia-$ver"

    # # Running out of inotify storage (see #26)
    # - name: inotify
    #   if: ${{ matrix.os == 'ubuntu-latest' }}
    #   run: echo 4 | sudo tee -a /proc/sys/fs/inotify/max_user_watches; julia --project --code-coverage=user -e 'using Pkg, Revise; cd(joinpath(dirname(pathof(Revise)), "..", "test")); include("inotify.jl")'
    - uses: julia-actions/julia-processcoverage@latest
    - uses: codecov/codecov-action@v6
      with:
        files: lcov.info
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true

  # Diagnostic job for the nightly-only Julia regression seen in #1038.
  # Runs a chosen subset of testsets on nightly to bisect what the entr failure
  # actually needs in terms of prior-test state. Each matrix entry is a label and
  # a quoted, space-separated list of testset names passed as ARGS to runtests.jl.
  # Add new entries to widen the search; results stand alone (no shared runner state).
  # Each scenario is run 3× to check whether failures are deterministic.
  diagnostic-nightly:
    name: Diagnostic ${{ matrix.scenario.label }} - run ${{ matrix.run }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3]
        scenario:
          - label: entr-only
            tests: '"entr" "entr with modules" "entr with all files"'
          - label: kwdef-then-entr        # the PR's new predict pass
            tests: '"struct revision (issue #1022)" "entr"'
          - label: requires-then-entr     # closest preceding testset (~53s, dynamic module loads)
            tests: '"New files & Requires.jl" "entr"'
          - label: structdep-then-entr    # dev'd test packages reloaded
            tests: '"struct revision (dependency)" "entr"'
          - label: switching-then-entr    # PkgChange v1↔v2 swap
            tests: '"Switching free/dev" "entr"'
          - label: three-suspects-then-entr   # combine the 3 single-pair suspects
            tests: '"struct revision (issue #1022)" "New files & Requires.jl" "struct revision (dependency)" "entr"'
          - label: all-struct-revision-then-entr  # all struct-revision tests + entr
            tests: '"Type info tracking" "struct revision (simple)" "struct revision (retry)" "struct revision (dependency)" "struct revision (issue #1022)" "entr"'
          - label: pre-entr-most              # most pre-entr testsets in source order
            tests: '"Comparison and line numbering" "Method deletion" "Revising macros" "More arg-modifying macros" "Manual track" "Cross-module extension" "Type info tracking" "struct revision (simple)" "struct revision (retry)" "struct revision (dependency)" "struct revision (issue #1022)" "Switching free/dev" "New files & Requires.jl" "entr"'
          - label: pre-entr-half-A    # first 33 pre-entr testsets (through Method deletion)
            tests: '"PkgData" "Package contents" "LineSkipping" "Equality and hashing" "Parse errors" "REPL input" "Signature extraction" "Comparison and line numbering" "Display" "File paths" "Base & stdlib file paths" "Namespace" "Multiple definitions" "Recursive types (issues #417 and #883)" "Cross-module extension" "@__FILE__" "Revision order" "Module docstring" "Changing docstring" "doc expr signature" "Undef in docstrings" "Macro docstrings (issue #309)" "Changing @inline annotations" "Revising macros" "More arg-modifying macros" "Line numbers" "Line numbers in backtraces and warnings" "New submodules" "Submodule in same file (#718)" "Timing (issue #341)" "DO NOT PARSE" "Method deletion" "entr"'
          - label: pre-entr-half-B    # remaining ~34 testsets through New files & Requires.jl
            tests: '"Method deletion specificity" "revise_file_now" "Evaled toplevel" "struct inner functions" "Issue 606" "Revision errors" "Retry on InterruptException" "Modify @enum" "revise_structs preference" "Type info tracking" "visit" "struct revision (simple)" "struct revision (retry)" "struct revision (dependency)" "struct revision (issue #1022)" "get_def" "Pkg exclusion" "Manual track" "Auto-track user scripts" "Distributed" "Distributed on worker" "Git" "Recipes" "CodeTracking #48" "Methods at REPL" "baremodule" "module style 2-argument includes (issue #670)" "External method tables" "Utilities" "Switching free/dev" "Switching environments" "Broken dependencies (issue #371)" "Non-jl include_dependency (issue #388)" "New files & Requires.jl" "revision_event autoreset" "entr"'
          - label: pre-entr-all       # control: all 67 pre-entr testsets (expect to fail like full nightly)
            tests: '"PkgData" "Package contents" "LineSkipping" "Equality and hashing" "Parse errors" "REPL input" "Signature extraction" "Comparison and line numbering" "Display" "File paths" "Base & stdlib file paths" "Namespace" "Multiple definitions" "Recursive types (issues #417 and #883)" "Cross-module extension" "@__FILE__" "Revision order" "Module docstring" "Changing docstring" "doc expr signature" "Undef in docstrings" "Macro docstrings (issue #309)" "Changing @inline annotations" "Revising macros" "More arg-modifying macros" "Line numbers" "Line numbers in backtraces and warnings" "New submodules" "Submodule in same file (#718)" "Timing (issue #341)" "DO NOT PARSE" "Method deletion" "Method deletion specificity" "revise_file_now" "Evaled toplevel" "struct inner functions" "Issue 606" "Revision errors" "Retry on InterruptException" "Modify @enum" "revise_structs preference" "Type info tracking" "visit" "struct revision (simple)" "struct revision (retry)" "struct revision (dependency)" "struct revision (issue #1022)" "get_def" "Pkg exclusion" "Manual track" "Auto-track user scripts" "Distributed" "Distributed on worker" "Git" "Recipes" "CodeTracking #48" "Methods at REPL" "baremodule" "module style 2-argument includes (issue #670)" "External method tables" "Utilities" "Switching free/dev" "Switching environments" "Broken dependencies (issue #371)" "Non-jl include_dependency (issue #388)" "New files & Requires.jl" "revision_event autoreset" "entr"'
          - label: spurious-then-entr  # the missing-from-prior-runs file-watcher test
            tests: '"Spurious events don''t prevent detection (issue #1025)" "entr"'
          - label: pre-entr-all-plus-spurious  # 67 + Spurious events; should fail like full nightly
            tests: '"PkgData" "Package contents" "LineSkipping" "Equality and hashing" "Parse errors" "REPL input" "Signature extraction" "Comparison and line numbering" "Display" "File paths" "Base & stdlib file paths" "Namespace" "Multiple definitions" "Recursive types (issues #417 and #883)" "Cross-module extension" "@__FILE__" "Revision order" "Module docstring" "Changing docstring" "doc expr signature" "Undef in docstrings" "Macro docstrings (issue #309)" "Changing @inline annotations" "Revising macros" "More arg-modifying macros" "Line numbers" "Line numbers in backtraces and warnings" "New submodules" "Submodule in same file (#718)" "Timing (issue #341)" "Spurious events don''t prevent detection (issue #1025)" "DO NOT PARSE" "Method deletion" "Method deletion specificity" "revise_file_now" "Evaled toplevel" "struct inner functions" "Issue 606" "Revision errors" "Retry on InterruptException" "Modify @enum" "revise_structs preference" "Type info tracking" "visit" "struct revision (simple)" "struct revision (retry)" "struct revision (dependency)" "struct revision (issue #1022)" "get_def" "Pkg exclusion" "Manual track" "Auto-track user scripts" "Distributed" "Distributed on worker" "Git" "Recipes" "CodeTracking #48" "Methods at REPL" "baremodule" "module style 2-argument includes (issue #670)" "External method tables" "Utilities" "Switching free/dev" "Switching environments" "Broken dependencies (issue #371)" "Non-jl include_dependency (issue #388)" "New files & Requires.jl" "revision_event autoreset" "entr"'
          - label: spurious-plus-most  # Spurious events + my pre-entr-most list; smaller scenario to test the interaction
            tests: '"Comparison and line numbering" "Method deletion" "Revising macros" "More arg-modifying macros" "Manual track" "Cross-module extension" "Type info tracking" "struct revision (simple)" "struct revision (retry)" "struct revision (dependency)" "struct revision (issue #1022)" "Switching free/dev" "New files & Requires.jl" "Spurious events don''t prevent detection (issue #1025)" "entr"'
    env:
      REVISE_PRECOMPILE_ERROR: true
    steps:
    - uses: actions/checkout@v6
    - uses: julia-actions/setup-julia@latest
      with:
        version: nightly
        show-versioninfo: true
    - uses: julia-actions/cache@v3
    - uses: julia-actions/julia-buildpkg@latest
    - name: Run testsets - ${{ matrix.scenario.label }}
      shell: bash
      env:
        # Pass via env var so special characters like '(' and '&' survive YAML→shell
        # substitution; eval then re-parses the embedded quoting.
        SCENARIO_TESTS: ${{ matrix.scenario.tests }}
      run: |
        eval "set -- $SCENARIO_TESTS"
        julia --project=test test/runtests.jl "$@"
